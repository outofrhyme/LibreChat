version: 1.3.6

# Storage & Performance Settings
cache: true
fileStrategy: "firebase"

modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "phoebe-kirby"
      label: "Kirby"
      preset:
        endpoint: "agents"
        agent_id: "agent_BlPvlGUrnLey8HQ9bIHHv"

    - name: "hannah-daisy"
      label: "Daisy"
      preset:
        endpoint: "agents"
        agent_id: "agent_k9P7Nfn7JYU4czjxT89_6"

interface:
  endpointsMenu: false
  modelSelect: true
  parameters: false
  agents:
    use: true

endpoints:
  openAI:
    enabled: true
    models:
      fetch: true
  agents:
    enabled: true

balance:
  enabled: true
  startBalance: 100000
  autoRefillEnabled: true
  refillAmount: 100000
  refillIntervalValue: 4
  refillIntervalUnit: "hours"
